name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & syntax check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyflakes

      - name: Check syntax
        run: python -m pyflakes switchbot_converter.py

  build:
    name: Build EXE
    runs-on: windows-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install pyinstaller tkinterdnd2

      - name: Build executable
        run: python -m PyInstaller switchbot_converter.spec

      - name: Verify EXE exists
        run: |
          if (!(Test-Path "dist\SwitchBot_Converter.exe")) {
            Write-Error "EXE not found after build"
            exit 1
          }
          $size = (Get-Item "dist\SwitchBot_Converter.exe").Length
          Write-Output "EXE size: $([math]::Round($size/1MB, 1)) MB"
        shell: pwsh

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwitchBot_Converter
          path: dist\SwitchBot_Converter.exe
          retention-days: 30
